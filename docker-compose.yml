version: "3.9"

services:
  agripulse:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agripulse-fmis
    ports:
      - "8000:8000"
    environment:
      - SENSOR_MODE=simulated
      - DATABASE_URL=sqlite:///data/agripulse.db
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
    volumes:
      - agripulse_data:/app/data
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: agripulse-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  agripulse_data:
  ollama_data:
