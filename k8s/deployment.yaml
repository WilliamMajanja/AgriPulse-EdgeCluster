apiVersion: apps/v1
kind: Deployment
metadata:
  name: agripulse-backend
  namespace: agripulse
  labels:
    app: agripulse-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agripulse-backend
  template:
    metadata:
      labels:
        app: agripulse-backend
    spec:
      containers:
        - name: agripulse-backend
          image: agripulse-fmis:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: agripulse-config
          volumeMounts:
            - name: agripulse-storage
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/v1/dashboard/summary
              port: 8000
          readinessProbe:
            tcpSocket:
              port: 8000
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: agripulse-storage
          persistentVolumeClaim:
            claimName: agripulse-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: agripulse
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-data
